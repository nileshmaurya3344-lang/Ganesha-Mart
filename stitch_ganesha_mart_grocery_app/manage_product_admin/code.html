<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Manage Product - Ganesha Mart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary": "#ffffff",
                      "surface-container-high": "#e8e8ea",
                      "secondary-fixed": "#ffdbc8",

                      "on-background": "#1a1c1e",
                      "inverse-surface": "#2f3133",
                      "surface-container": "#eeeef0",
                      "on-tertiary-container": "#440099",
                      "on-secondary-container": "#592600",
                      "inverse-on-surface": "#f0f0f3",
                      "on-error": "#ffffff",
                      "surface-bright": "#f9f9fc",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#dadadc",
                      "surface-tint": "#006e24",
                      "background": "#f9f9fc",
                      "on-tertiary-fixed-variant": "#5a00c6",
                      "tertiary-container": "#af88ff",
                      "on-error-container": "#93000a",
                      "primary-container": "#38b44e",
                      "on-secondary-fixed": "#321200",
                      "error": "#ba1a1a",
                      "on-surface-variant": "#3e4a3c",
                      "secondary-fixed-dim": "#ffb68b",
                      "on-primary-container": "#003f11",
                      "outline-variant": "#bdcab8",
                      "tertiary-fixed-dim": "#d2bbff",
                      "primary": "#006e24",
                      "surface-container-highest": "#e2e2e5",
                      "secondary": "#994700",
                      "on-tertiary-fixed": "#25005a",
                      "surface-variant": "#e2e2e5",
                      "surface-container-low": "#f3f3f6",
                      "primary-fixed-dim": "#66df73",
                      "on-primary-fixed": "#002106",
                      "on-secondary-fixed-variant": "#753400",
                      "error-container": "#ffdad6",
                      "secondary-container": "#fb7800",
                      "primary-fixed": "#82fc8c",
                      "outline": "#6e7b6b",
                      "on-surface": "#1a1c1e",
                      "inverse-primary": "#66df73",
                      "on-primary": "#ffffff",
                      "tertiary-fixed": "#eaddff",
                      "surface": "#f9f9fc",
                      "tertiary": "#732ee4"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-lg": "1.5rem",
                      "gutter": "0.75rem",
                      "stack-md": "1rem",
                      "stack-sm": "0.25rem",
                      "container-margin": "1rem"
              },
              "fontFamily": {
                      "label-sm": [
                              "Be Vietnam Pro"
                      ],
                      "headline-sm": [
                              "Plus Jakarta Sans"
                      ],
                      "headline-md": [
                              "Plus Jakarta Sans"
                      ],
                      "label-lg": [
                              "Be Vietnam Pro"
                      ],
                      "body-lg": [
                              "Be Vietnam Pro"
                      ],
                      "headline-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "body-md": [
                              "Be Vietnam Pro"
                      ]
              },
              "fontSize": {
                      "label-sm": [
                              "12px",

                      ],
                      "body-lg": [

                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "32px",

                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",

                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"

                      ]
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pt-16 pb-24 md:pb-8">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest font-headline-sm shadow-sm fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 border-b border-surface-container-highest">
<button class="text-on-surface hover:bg-surface-container-low transition-all duration-200 active:scale-95 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-on-surface flex-1 text-center font-bold text-lg mr-10">Manage Product</h1>
</header>
<main class="max-w-3xl mx-auto px-container-margin py-stack-lg flex flex-col gap-stack-lg">
<!-- Image Upload Section -->
<section class="bg-surface-container-lowest rounded-xl p-stack-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] flex flex-col items-center gap-stack-md border border-surface-variant">
<div class="relative w-32 h-32 rounded-xl overflow-hidden bg-surface-container flex items-center justify-center border-2 border-dashed border-outline-variant group cursor-pointer hover:border-primary transition-colors">
<!-- Placeholder Image - would be replaced by actual preview if uploaded -->
<img alt="Product Image Preview" class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-30 transition-opacity" data-alt="close up of a generic milk carton on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMysNg0KzVeRSx20IlfvOU3JMECAOU43w4aBL5yyL0gfzX2HZjt-khrlf8oFiTrYKyfxwr4xd_rl0AnAH3m6IUPBE3F2s5NO6e2_MHd0zcWeoVlb3AdhaeEh-gwYiJ80WWjxbbODjQko4xclefT4Sop-hwMIIPbZ8cUYQ7bTtzLfon2sqIyW2-JiyBDQtV1gjeAXhS7__VxxesnzkF4I0RN8eLMQs6EH3ji-Kyb5o61h9ipuyYRInc_1jwNqdIylY5uluEKcPTtnM"/>
<div class="z-10 flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="add_photo_alternate">add_photo_alternate</span>
<span class="font-label-sm">Upload Image</span>
</div>
</div>
<p class="font-body-md text-on-surface-variant text-center max-w-xs">Upload a high-quality image of the product. Minimum size 500x500px.</p>
</section>
<!-- Basic Info Form -->
<section class="bg-surface-container-lowest rounded-xl p-stack-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] flex flex-col gap-stack-md border border-surface-variant">
<h2 class="font-headline-sm text-on-surface border-b border-surface-variant pb-2">Product Details</h2>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-lg text-on-surface" for="productName">Product Name</label>
<input class="w-full rounded-lg border-outline-variant bg-surface px-4 py-3 font-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="productName" placeholder="e.g. Amul Taaza Toned Milk" type="text" value="Amul Taaza Toned Milk"/>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-lg text-on-surface" for="productPrice">Price (₹)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg">₹</span>
<input class="w-full rounded-lg border-outline-variant bg-surface pl-8 pr-4 py-3 font-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="productPrice" placeholder="0.00" type="number" value="68.00"/>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-lg text-on-surface" for="productMRP">MRP (₹)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg">₹</span>
<input class="w-full rounded-lg border-outline-variant bg-surface pl-8 pr-4 py-3 font-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="productMRP" placeholder="0.00" type="number" value="70.00"/>
</div>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-lg text-on-surface" for="productCategory">Category</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border-outline-variant bg-surface px-4 py-3 font-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="productCategory">
<option selected="" value="milk_dairy">Milk &amp; Dairy</option>
<option value="bread_bakery">Bread &amp; Bakery</option>
<option value="beverages">Beverages</option>
<option value="rice">Rice</option>
<option value="atta_pulses">Atta &amp; Pulses</option>
<option value="snacks_biscuits">Snacks &amp; Biscuits</option>
<option value="oil_masala">Oil &amp; Masala</option>
<option value="cleaning_household">Cleaning &amp; Household</option>
<option value="personal_care">Personal Care</option>
<option value="eggs_protein">Eggs &amp; Protein</option>
<option value="vegetables">Vegetables</option>
<option value="stationery">Stationery</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-lg text-on-surface" for="productDescription">Description</label>
<textarea class="w-full rounded-lg border-outline-variant bg-surface px-4 py-3 font-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow resize-y" id="productDescription" placeholder="Enter product details, ingredients, usage instructions..." rows="4">Fresh toned milk, homogenized and pasteurized. Packed with essential nutrients.</textarea>
</div>
</section>
<!-- Inventory Control -->
<section class="bg-surface-container-lowest rounded-xl p-stack-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] flex flex-col gap-stack-md border border-surface-variant">
<h2 class="font-headline-sm text-on-surface border-b border-surface-variant pb-2">Inventory</h2>
<div class="flex items-center justify-between py-2">
<div class="flex flex-col">
<span class="font-label-lg text-on-surface">In Stock</span>
<span class="font-label-sm text-on-surface-variant">Toggle product availability</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-lg text-on-surface" for="currentQuantity">Current Quantity</label>
<div class="flex items-center gap-3">
<input class="flex-1 rounded-lg border-outline-variant bg-surface px-4 py-3 font-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow" id="currentQuantity" placeholder="0" type="number" value="45"/>
<span class="font-body-md text-on-surface-variant w-16">Units</span>
</div>
</div>
</section>
<!-- Action Buttons -->
<div class="flex gap-gutter mt-4">
<button class="flex-1 py-3 px-4 rounded-full font-label-lg text-on-surface bg-surface-container-high hover:bg-surface-variant transition-colors border border-outline-variant">
                Cancel
            </button>
<button class="flex-[2] py-3 px-4 rounded-full font-label-lg text-on-primary bg-primary hover:bg-surface-tint transition-colors shadow-sm flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="save">save</span>
                Save Product
            </button>
</div>
</main>
</body></html>
