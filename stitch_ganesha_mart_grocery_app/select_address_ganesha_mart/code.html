<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Select Address - Ganesha Mart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#440099",
                        "on-secondary-container": "#592600",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eeeef0",
                        "on-primary-fixed-variant": "#005319",
                        "on-background": "#1a1c1e",
                        "inverse-surface": "#2f3133",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#ffdbc8",
                        "surface-container-high": "#e8e8ea",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#3e4a3c",
                        "primary-container": "#38b44e",
                        "on-secondary-fixed": "#321200",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "tertiary-container": "#af88ff",
                        "surface-bright": "#f9f9fc",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#006e24",
                        "background": "#f9f9fc",
                        "surface-dim": "#dadadc",
                        "inverse-on-surface": "#f0f0f3",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e5",
                        "surface-container-low": "#f3f3f6",
                        "primary-fixed-dim": "#66df73",
                        "on-tertiary-fixed": "#25005a",
                        "primary": "#006e24",
                        "secondary": "#994700",
                        "surface-container-highest": "#e2e2e5",
                        "outline-variant": "#bdcab8",
                        "secondary-fixed-dim": "#ffb68b",
                        "on-primary-container": "#003f11",
                        "tertiary-fixed-dim": "#d2bbff",
                        "tertiary-fixed": "#eaddff",
                        "surface": "#f9f9fc",
                        "tertiary": "#732ee4",
                        "primary-fixed": "#82fc8c",
                        "outline": "#6e7b6b",
                        "on-surface": "#1a1c1e",
                        "inverse-primary": "#66df73",
                        "secondary-container": "#fb7800",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#002106",
                        "on-secondary-fixed-variant": "#753400"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "1.5rem",
                        "gutter": "0.75rem",
                        "stack-sm": "0.25rem",
                        "container-margin": "1rem",
                        "stack-md": "1rem"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar hiding for cleaner mobile feel */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body-md flex flex-col h-[884px] antialiased">
<!-- TopAppBar (From Shared Components) -->
<header class="bg-white dark:bg-gray-950 docked full-width top-0 border-b border-gray-100 dark:border-gray-800 shadow-sm flex items-center justify-between px-4 h-16 w-full shrink-0 z-50 sticky">
<button class="text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-900 active:scale-95 transition-transform flex items-center justify-center w-10 h-10 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-on-surface">Select Address</h1>
<div class="w-10"></div> <!-- Spacer for flex balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto pb-[100px]">
<!-- Search Section -->
<div class="px-container-margin pt-container-margin pb-gutter">
<div class="flex items-center bg-surface-container-low border border-surface-variant rounded-xl px-4 py-3.5 focus-within:border-primary-container focus-within:ring-1 focus-within:ring-primary-container transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3">search</span>
<input class="bg-transparent flex-1 outline-none font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant w-full" placeholder="Search for area, street name..." type="text"/>
</div>
</div>
<!-- Current Location Button -->
<div class="px-container-margin pb-stack-lg border-b border-surface-variant mb-stack-lg">
<button class="w-full flex items-center justify-between p-4 bg-primary-container/10 rounded-xl border border-primary-container/20 active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">my_location</span>
<span class="font-label-lg text-label-lg text-primary-container">Use Current Location</span>
</div>
<span class="material-symbols-outlined text-primary-container/50">chevron_right</span>
</button>
</div>
<!-- Saved Addresses Section -->
<div class="px-container-margin">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-stack-md">Saved Addresses</h2>
<div class="space-y-gutter">
<!-- Home Address Card -->
<div class="flex items-start gap-4 p-4 border border-outline-variant rounded-xl bg-surface-container-lowest cursor-pointer hover:border-primary-container/50 transition-colors relative overflow-hidden group">
<div class="mt-0.5 text-on-surface-variant group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<div class="flex-1 pr-6">
<h3 class="font-label-lg text-label-lg text-on-surface mb-1">Home</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Vinay Nagar, Faridabad, Haryana 121003</p>
</div>
<!-- Selected State Indication (Mocked active for demo) -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center justify-center w-5 h-5 rounded-full border-2 border-primary-container bg-primary-container">
<span class="material-symbols-outlined text-on-primary text-[14px]" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<!-- Work Address Card -->
<div class="flex items-start gap-4 p-4 border border-outline-variant rounded-xl bg-surface-container-lowest cursor-pointer hover:border-primary-container/50 transition-colors">
<div class="mt-0.5 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<div class="flex-1 pr-6">
<h3 class="font-label-lg text-label-lg text-on-surface mb-1">Work</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Sector 15, Faridabad, Haryana</p>
</div>
<!-- Unselected State Indication -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center justify-center w-5 h-5 rounded-full border-2 border-outline-variant"></div>
</div>
</div>
<!-- Add New Address Button -->
<button class="w-full mt-stack-md flex items-center justify-center gap-2 p-4 border-2 border-dashed border-outline-variant rounded-xl text-primary font-label-lg text-label-lg hover:border-primary-container hover:text-primary-container hover:bg-primary-container/5 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">add</span>
                Add New Address
            </button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-surface-container-lowest border-t border-surface-variant shadow-[0_-8px_24px_rgba(0,0,0,0.04)] z-40 pb-safe">
<button class="w-full bg-primary-container text-on-primary-container font-label-lg text-label-lg py-4 rounded-xl flex items-center justify-center shadow-sm active:scale-[0.98] transition-transform">
            Confirm Address
        </button>
</div>
</body></html>
